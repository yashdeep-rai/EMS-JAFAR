model:
  _target_: src.upsampler.JAFAR
  input_dim: 3
  qk_dim: 128
  v_dim: ${model.feature_dim}
  feature_dim: ${get_feature:${backbone.name}}
  kernel_size: 1
  num_heads: 4
  name: jafar
backbone:
  _target_: src.backbone.PretrainedViTWrapper
  name: vit_small_patch14_dinov2.lvd142m
  norm: true
optimizer:
  _target_: torch.optim.AdamW
  lr: 0.0005
  betas:
  - 0.9
  - 0.999
  weight_decay: 1.0e-05
loss:
  _target_: src.loss.Loss
  loss_type: cosine_mse
  dim: ${model.feature_dim}
train_dataset:
  _target_: dataloader.ImageDataset
  root: ${dataroot}/train
  root_cache: null
val_dataset:
  _target_: dataloader.ImageDataset
  root: ${dataroot}/val
  root_cache: null
train_dataloader:
  _target_: torch.utils.data.DataLoader
  dataset: ${dataset.train}
  batch_size: 2
  shuffle: true
  worker_init_fn:
    _target_: utils.training.seed_worker
  num_workers: 8
  pin_memory: true
val_dataloader:
  _target_: torch.utils.data.DataLoader
  dataset: ${dataset.val}
  batch_size: 1
  shuffle: true
  worker_init_fn:
    _target_: utils.training.seed_worker
  num_workers: 8
  pin_memory: true
img_size: 224
epochs: 1
max_steps: 100000
project_root: ${hydra:runtime.cwd}
dataroot: ${project_root}/data/imagenet
bfloat16: true
ratio: random
sanity: true
dataset_evaluation:
  _target_: evaluation.dataset.voc.VOCDataset
  root: ${project_root}/data/
  split: train
  year: '2012'
  download: false
  include_labels: true
  num_classes: 21
  tag: voc
eval:
  task: seg
  model_ckpt: /home/yashdeep/Documents/JAFAR/weights/vit_small_patch14_dinov2.lvd142m.pth
num_epochs: 20
target_size: ${img_size}
metrics:
  seg:
    num_classes: ${dataset_evaluation.num_classes}
  depth:
    min_depth: 0.001
    max_depth: 10
