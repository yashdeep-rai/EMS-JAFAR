hydra:
  run:
    dir: evaluation/unsupervised/voc/vit_small_patch14_dinov2.lvd142m
  sweep:
    dir: multirun/${now:%Y-%m-%d}/${now:%H-%M-%S}
    subdir: ${hydra.job.num}
  launcher:
    _target_: hydra._internal.core_plugins.basic_launcher.BasicLauncher
  sweeper:
    _target_: hydra._internal.core_plugins.basic_sweeper.BasicSweeper
    max_batch_size: null
    params: null
  help:
    app_name: ${hydra.job.name}
    header: '${hydra.help.app_name} is powered by Hydra.

      '
    footer: 'Powered by Hydra (https://hydra.cc)

      Use --hydra-help to view Hydra specific help

      '
    template: '${hydra.help.header}

      == Configuration groups ==

      Compose your configuration from those groups (group=option)


      $APP_CONFIG_GROUPS


      == Config ==

      Override anything in the config (foo.bar=value)


      $CONFIG


      ${hydra.help.footer}

      '
  hydra_help:
    template: 'Hydra (${hydra.runtime.version})

      See https://hydra.cc for more info.


      == Flags ==

      $FLAGS_HELP


      == Configuration groups ==

      Compose your configuration from those groups (For example, append hydra/job_logging=disabled
      to command line)


      $HYDRA_CONFIG_GROUPS


      Use ''--cfg hydra'' to Show the Hydra config.

      '
    hydra_help: ???
  hydra_logging:
    version: 1
    formatters:
      simple:
        format: '[%(asctime)s][HYDRA] %(message)s'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: simple
        stream: ext://sys.stdout
    root:
      level: INFO
      handlers:
      - console
    loggers:
      logging_example:
        level: DEBUG
    disable_existing_loggers: false
  job_logging:
    version: 1
    formatters:
      simple:
        format: '[%(asctime)s][%(name)s][%(levelname)s] - %(message)s'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: simple
        stream: ext://sys.stdout
      file:
        class: logging.FileHandler
        formatter: simple
        filename: ${hydra.runtime.output_dir}/${hydra.job.name}.log
    root:
      level: INFO
      handlers:
      - console
      - file
    disable_existing_loggers: false
  env: {}
  mode: RUN
  searchpath: []
  callbacks: {}
  output_subdir: .hydra
  overrides:
    hydra:
    - hydra.run.dir=evaluation/unsupervised/voc/vit_small_patch14_dinov2.lvd142m
    - hydra.mode=RUN
    task:
    - eval.task=seg
    - dataset_evaluation=voc
    - backbone.name=vit_small_patch14_dinov2.lvd142m
    - eval.model_ckpt=/home/yashdeep/Documents/JAFAR/weights/vit_small_patch14_dinov2.lvd142m.pth
    - sanity=True
    - img_size=224
  job:
    name: train_probes
    chdir: null
    override_dirname: backbone.name=vit_small_patch14_dinov2.lvd142m,dataset_evaluation=voc,eval.model_ckpt=/home/yashdeep/Documents/JAFAR/weights/vit_small_patch14_dinov2.lvd142m.pth,eval.task=seg,img_size=224,sanity=True
    id: ???
    num: ???
    config_name: eval
    env_set: {}
    env_copy: []
    config:
      override_dirname:
        kv_sep: '='
        item_sep: ','
        exclude_keys: []
  runtime:
    version: 1.3.3
    version_base: '1.1'
    cwd: /home/yashdeep/Documents/JAFAR
    config_sources:
    - path: hydra.conf
      schema: pkg
      provider: hydra
    - path: /home/yashdeep/Documents/JAFAR/config
      schema: file
      provider: main
    - path: ''
      schema: structured
      provider: schema
    output_dir: /home/yashdeep/Documents/JAFAR/evaluation/unsupervised/voc/vit_small_patch14_dinov2.lvd142m
    choices:
      dataset_evaluation: voc
      dataloader@val_dataloader: val
      dataloader@train_dataloader: train
      dataset@val_dataset: val
      dataset@train_dataset: train
      loss: base
      optimizer: adamw
      backbone: base
      model: jafar
      hydra/env: default
      hydra/callbacks: null
      hydra/job_logging: default
      hydra/hydra_logging: default
      hydra/hydra_help: default
      hydra/help: default
      hydra/sweeper: basic
      hydra/launcher: basic
      hydra/output: default
  verbose: false
